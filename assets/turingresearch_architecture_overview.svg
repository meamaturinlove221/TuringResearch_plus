<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"></stop>
      <stop offset="1" stop-color="#FCFCFE"></stop>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A63F3"></stop>
      <stop offset="1" stop-color="#7A5AF8"></stop>
    </linearGradient>

    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#243B6B" flood-opacity="0.10"></feDropShadow>
    </filter>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2L10 7L2 12" stroke="#667085" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    </marker>

    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 400; fill: #475467; }
      .sectionTitle { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #101828; }
      .boxTitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #101828; }
      .boxBody { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 400; fill: #344054; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 400; fill: #475467; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 600; fill: #475467; }
      .pillText { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #1D2939; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"></rect>

  <!-- Top Header -->
  <rect x="52" y="42" width="1496" height="124" rx="24" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <rect x="78" y="70" width="12" height="68" rx="6" fill="url(#titleGrad)"></rect>
  <text x="110" y="96" class="title">TuringResearch</text>
  <text x="110" y="128" class="subtitle">Research operating system for AI-assisted scientific iteration, evidence management, and experiment planning.</text>
  <text x="110" y="150" class="subtitle">This architecture emphasizes reproducible workflows, structured evidence, paper-to-method understanding, and advisor-facing outputs.</text>

  <!-- Pills -->
  <rect x="1140" y="73" width="120" height="34" rx="17" fill="#EEF4FF" stroke="#C7D7FE"></rect>
  <text x="1170" y="95" class="pillText">MCP-first</text>

  <rect x="1272" y="73" width="136" height="34" rx="17" fill="#F5F3FF" stroke="#D9CCFF"></rect>
  <text x="1298" y="95" class="pillText">Evidence-led</text>

  <rect x="1420" y="73" width="100" height="34" rx="17" fill="#ECFDF3" stroke="#ABEFC6"></rect>
  <text x="1446" y="95" class="pillText">Codex-ready</text>

  <!-- Section headings -->
  <text x="72" y="215" class="sectionTitle">Input Layer</text>
  <text x="430" y="215" class="sectionTitle">Core Research Engine</text>
  <text x="1088" y="215" class="sectionTitle">Output and Delivery</text>
  <text x="72" y="744" class="sectionTitle">Foundational Infrastructure</text>

  <!-- Column 1 -->
  <rect x="60" y="236" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="84" y="267" class="boxTitle">Research Intake</text>
  <text x="84" y="293" class="boxBody">
    <tspan x="84" dy="0">Capture research intent, goals,</tspan>
    <tspan x="84" dy="20">constraints, and advisor feedback</tspan>
    <tspan x="84" dy="20">from prompts, notes, and docs.</tspan>
  </text>

  <rect x="60" y="372" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="84" y="403" class="boxTitle">Paper and Source Intake</text>
  <text x="84" y="429" class="boxBody">
    <tspan x="84" dy="0">Ingest PDFs, Markdown notes,</tspan>
    <tspan x="84" dy="20">web references, repositories,</tspan>
    <tspan x="84" dy="20">and manually curated materials.</tspan>
  </text>

  <rect x="60" y="508" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="84" y="539" class="boxTitle">Artifact and Experiment Intake</text>
  <text x="84" y="565" class="boxBody">
    <tspan x="84" dy="0">Read bundles, logs, images,</tspan>
    <tspan x="84" dy="20">tables, metrics, manifests,</tspan>
    <tspan x="84" dy="20">and experiment outputs.</tspan>
  </text>

  <!-- Column 2 -->
  <rect x="420" y="236" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="444" y="267" class="boxTitle">Evidence Ledger</text>
  <text x="444" y="293" class="boxBody">
    <tspan x="444" dy="0">Track facts as observed, planned,</tspan>
    <tspan x="444" dy="20">fake-data, blocked, or</tspan>
    <tspan x="444" dy="20">requires-human-verification.</tspan>
  </text>

  <rect x="420" y="372" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="444" y="403" class="boxTitle">Knowledge and Vault Layer</text>
  <text x="444" y="429" class="boxBody">
    <tspan x="444" dy="0">Organize claims, sources, notes,</tspan>
    <tspan x="444" dy="20">citations, and cross-file context</tspan>
    <tspan x="444" dy="20">for later retrieval and reuse.</tspan>
  </text>

  <rect x="420" y="508" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="444" y="539" class="boxTitle">Method and Figure Analysis</text>
  <text x="444" y="565" class="boxBody">
    <tspan x="444" dy="0">Convert papers into method cards,</tspan>
    <tspan x="444" dy="20">equation notes, figure summaries,</tspan>
    <tspan x="444" dy="20">and architecture mappings.</tspan>
  </text>

  <!-- Column 3 -->
  <rect x="780" y="236" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="804" y="267" class="boxTitle">Hypothesis and Route Compiler</text>
  <text x="804" y="293" class="boxBody">
    <tspan x="804" dy="0">Build hypothesis trees, route plans,</tspan>
    <tspan x="804" dy="20">decision logs, and experiment</tspan>
    <tspan x="804" dy="20">matrices with explicit gates.</tspan>
  </text>

  <rect x="780" y="372" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="804" y="403" class="boxTitle">Artifact and Visual Auditor</text>
  <text x="804" y="429" class="boxBody">
    <tspan x="804" dy="0">Audit bundles, manifests,</tspan>
    <tspan x="804" dy="20">boards, and visual evidence</tspan>
    <tspan x="804" dy="20">against reproducibility gates.</tspan>
  </text>

  <rect x="780" y="508" width="300" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="804" y="539" class="boxTitle">Planning and Orchestration</text>
  <text x="804" y="565" class="boxBody">
    <tspan x="804" dy="0">Generate Codex prompts, sprint plans,</tspan>
    <tspan x="804" dy="20">task ordering, risk registers,</tspan>
    <tspan x="804" dy="20">and next-step action bundles.</tspan>
  </text>

  <!-- Column 4 -->
  <rect x="1140" y="236" width="400" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="1164" y="267" class="boxTitle">Research Documents</text>
  <text x="1164" y="293" class="boxBody">
    <tspan x="1164" dy="0">One-click Markdown outputs for</tspan>
    <tspan x="1164" dy="20">briefs, plans, analyses, related work,</tspan>
    <tspan x="1164" dy="20">and project status documentation.</tspan>
  </text>

  <rect x="1140" y="372" width="400" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="1164" y="403" class="boxTitle">Architecture and Figure Assets</text>
  <text x="1164" y="429" class="boxBody">
    <tspan x="1164" dy="0">Produce SVG diagrams, Mermaid graphs,</tspan>
    <tspan x="1164" dy="20">paper-style visuals, and structured</tspan>
    <tspan x="1164" dy="20">figure-caption understanding.</tspan>
  </text>

  <rect x="1140" y="508" width="400" height="118" rx="20" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>
  <text x="1164" y="539" class="boxTitle">Advisor and Release Packages</text>
  <text x="1164" y="565" class="boxBody">
    <tspan x="1164" dy="0">Assemble advisor summaries,</tspan>
    <tspan x="1164" dy="20">public examples, release checklists,</tspan>
    <tspan x="1164" dy="20">and upload-safe artifact bundles.</tspan>
  </text>

  <!-- Flow arrows -->
  <line x1="360" y1="295" x2="420" y2="295" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="360" y1="431" x2="420" y2="431" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="360" y1="567" x2="420" y2="567" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>

  <line x1="720" y1="295" x2="780" y2="295" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="720" y1="431" x2="780" y2="431" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="720" y1="567" x2="780" y2="567" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>

  <line x1="1080" y1="295" x2="1140" y2="295" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="1080" y1="431" x2="1140" y2="431" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="1080" y1="567" x2="1140" y2="567" stroke="#98A2B3" stroke-width="2.5" marker-end="url(#arrow)"></line>

  <!-- Cross-support line -->
  <path d="M570 626 C570 670, 930 670, 930 626" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"></path>

  <!-- Foundation area -->
  <rect x="58" y="764" width="1484" height="164" rx="24" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5" filter="url(#shadowSoft)"></rect>

  <rect x="86" y="798" width="260" height="96" rx="18" fill="#F8FAFC" stroke="#E4E7EC"></rect>
  <text x="108" y="827" class="boxTitle">Contracts and Skills</text>
  <text x="108" y="851" class="small">
    <tspan x="108" dy="0">Contract tests, skill manifests,</tspan>
    <tspan x="108" dy="18">workflow definitions, and</tspan>
    <tspan x="108" dy="18">stable interface boundaries.</tspan>
  </text>

  <rect x="376" y="798" width="260" height="96" rx="18" fill="#F8FAFC" stroke="#E4E7EC"></rect>
  <text x="398" y="827" class="boxTitle">QA and Reproducibility</text>
  <text x="398" y="851" class="small">
    <tspan x="398" dy="0">Dry-run tests, release gates,</tspan>
    <tspan x="398" dy="18">schema validation, and</tspan>
    <tspan x="398" dy="18">claim-evidence consistency checks.</tspan>
  </text>

  <rect x="666" y="798" width="260" height="96" rx="18" fill="#F8FAFC" stroke="#E4E7EC"></rect>
  <text x="688" y="827" class="boxTitle">Storage and Manifests</text>
  <text x="688" y="851" class="small">
    <tspan x="688" dy="0">Artifact manifests, markdown, json,</tspan>
    <tspan x="688" dy="18">evidence tags, hashes, and</tspan>
    <tspan x="688" dy="18">upload-safe packaging rules.</tspan>
  </text>

  <rect x="956" y="798" width="260" height="96" rx="18" fill="#F8FAFC" stroke="#E4E7EC"></rect>
  <text x="978" y="827" class="boxTitle">Tool and Runtime Layer</text>
  <text x="978" y="851" class="small">
    <tspan x="978" dy="0">Python package structure, MCP server,</tspan>
    <tspan x="978" dy="18">CLI entry points, and</tspan>
    <tspan x="978" dy="18">local fake-mode development flow.</tspan>
  </text>

  <rect x="1246" y="798" width="270" height="96" rx="18" fill="#F8FAFC" stroke="#E4E7EC"></rect>
  <text x="1268" y="827" class="boxTitle">Deployment Modes</text>
  <text x="1268" y="851" class="small">
    <tspan x="1268" dy="0">Local co-location first, with future</tspan>
    <tspan x="1268" dy="18">handoff, NAS, SSH, and</tspan>
    <tspan x="1268" dy="18">artifact sync adapters deferred.</tspan>
  </text>

  <!-- Footer -->
  <line x1="60" y1="947" x2="1540" y2="947" stroke="#E4E7EC" stroke-width="1"></line>
  <text x="72" y="970" class="small">Figure: High-level architecture of TuringResearch. The system connects research intake, evidence management, paper understanding, experiment planning, and advisor-facing delivery under reproducible workflow constraints.</text>
</svg>