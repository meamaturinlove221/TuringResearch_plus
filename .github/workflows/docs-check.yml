name: Docs check

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TURINGRESEARCH_MODE: "fake"
  TURINGRESEARCH_ENABLE_LIVE_TESTS: "0"
  TURINGRESEARCH_ENABLE_WEB_LIVE: "0"
  TURINGRESEARCH_ENABLE_APIFY_LIVE: "0"
  TURINGRESEARCH_ENABLE_SFTP_LIVE: "0"

jobs:
  docs:
    name: Docs build dry-run and public entry checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs check dependencies
        run: python -m pip install -e ".[dev,pdf,mcp]"

      - name: Run docs site build hardening
        run: python -m pytest tests/workflow/test_docs_site_build_hardening.py -q

      - name: Run docs deployment preflight
        run: python -m pytest tests/workflow/test_docs_deployment_preflight.py -q

      - name: Run docs deployment dry-run
        run: python -m pytest tests/workflow/test_docs_deployment_dry_run.py -q

      - name: Run docs release bundle dry-run
        run: python -m pytest tests/workflow/test_docs_release_bundle.py -q

      - name: Run public release hygiene
        run: python -m pytest tests/contract/test_public_release_hygiene.py -q

      - name: Run public demo walkthrough checks
        run: python -m pytest tests/workflow/test_public_demo_walkthrough_files.py -q
