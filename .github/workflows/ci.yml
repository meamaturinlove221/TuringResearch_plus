name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TURINGRESEARCH_MODE: "fake"
  TURINGRESEARCH_ENABLE_LIVE_TESTS: "0"
  TURINGRESEARCH_ENABLE_WEB_LIVE: "0"
  TURINGRESEARCH_ENABLE_APIFY_LIVE: "0"
  TURINGRESEARCH_ENABLE_SFTP_LIVE: "0"
  TURINGRESEARCH_ENABLE_PLUGINS: "0"

jobs:
  core-checks:
    name: v1.6 release candidate checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release-candidate dependencies
        run: python -m pip install -e ".[dev,pdf,mcp]"

      - name: Ruff check
        run: python -m ruff check src tests

      - name: Run package metadata and install smoke
        run: python -m pytest tests/contract/test_package_metadata.py tests/contract/test_package_metadata_v1_6.py tests/workflow/test_install_smoke_fake.py -q

      - name: Run unit tests
        run: python -m pytest tests/unit -m "not live and not manual"

      - name: Run contract tests
        run: python -m pytest tests/contract -m "not live and not manual"

      - name: Run release artifact manifest dry-run checks
        run: python -m pytest tests/workflow/test_release_artifact_manifest.py -q

      - name: Run name integrity
        run: python -m pytest tests/contract/test_name_integrity.py -q

      - name: Run privacy gate
        run: python -m pytest tests/workflow/test_public_demo_privacy_gate.py -q

  mypy-optional:
    name: Optional mypy
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install typing dependencies
        run: python -m pip install -e ".[dev,pdf,mcp]"

      - name: Mypy optional
        run: python -m mypy src
