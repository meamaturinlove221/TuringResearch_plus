name: Privacy gate

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TURINGRESEARCH_MODE: "fake"
  TURINGRESEARCH_ENABLE_LIVE_TESTS: "0"
  TURINGRESEARCH_ENABLE_WEB_LIVE: "0"
  TURINGRESEARCH_ENABLE_APIFY_LIVE: "0"
  TURINGRESEARCH_ENABLE_SFTP_LIVE: "0"

jobs:
  privacy:
    name: Privacy and public release safety gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install privacy gate dependencies
        run: python -m pip install -e ".[dev,pdf,mcp]"

      - name: Run public demo privacy gate
        run: python -m pytest tests/workflow/test_public_demo_privacy_gate.py -q

      - name: Run v1.5 security privacy gate
        run: python -m pytest tests/contract/test_v1_5_security_privacy_gate.py -q

      - name: Run split bundle safety gate
        run: python -m pytest tests/workflow/test_v1_1_split_ready_bundles.py -q

      - name: Run public release hygiene gate
        run: python -m pytest tests/contract/test_public_release_hygiene.py -q

      - name: Run release artifact manifest safety gate
        run: python -m pytest tests/workflow/test_release_artifact_manifest.py -q
