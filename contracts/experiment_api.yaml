name: experiment_api
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: experiment_api
status: contract_draft
release_target: v0.8 planning
api_status: public_api_contract_draft
default_enabled: true
network_behavior: no_network
description: >-
  Draft public API contract for future experiment namespace boundaries. The
  namespace describes plans, gates, failures, and run status; it does not run
  experiments by default.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

module_name: turing_research_experiment
purpose: >-
  Provide route DSL, hard gates, failure taxonomy, run comparison, and
  dashboard run-layer status models.
stability: beta
current_compatibility_namespace: turing_research_plus
public_models:
  - ExperimentRoute
  - HardGateReport
  - FailureTaxonomyReport
  - RunComparisonReport
  - RunStatus
public_functions_tools:
  - experiment_route_compile
  - hard_gate_validate
  - failure_classify
  - run_compare
  - dashboard_run_status
input_schema:
  route_spec: local_yaml_or_model
  evidence_refs: required_for_claims
  run_metadata: optional_metadata_only
output_schema:
  route_plan: ExperimentRoute
  gate_report: HardGateReport
  failure_report: FailureTaxonomyReport
  comparison_report: RunComparisonReport
internal_only_modules:
  - execution adapters
  - live modal internals
  - fake fixture builders
deprecated_aliases: []
tests:
  - tests/unit/test_experiment_route_models.py
  - tests/unit/test_hard_gate_library.py
  - tests/unit/test_failure_taxonomy_models.py
  - tests/unit/test_run_comparison.py
  - tests/contract/test_module_public_api_contracts.py
docs:
  - docs/module-public-api-contracts.md
  - docs/experiment-route-dsl.md
  - docs/failure-taxonomy-engine.md
safety:
  no_network_by_default: true
  no_remote_execution_by_default: true
  planned_not_executed: true
  requires_human_review: true
non_goals:
  - no automatic experiment execution
  - no planned-as-observed promotion
  - no unsupported SparseConv3D success claim
