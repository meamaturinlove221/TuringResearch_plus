name: quality_regression_gate
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: quality_regression_gate
status: implemented_minimal
release_target: v0.6 Sprint 3
api_status: local_python_helper_not_public_mcp
default_enabled: true
network_behavior: no_network
description: >-
  Define local quality metrics and regression gates for docs, tests, contracts,
  examples, safety boundaries, privacy readiness, and release readiness.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

quality_metrics:
  - docs completeness
  - test coverage proxy
  - contract consistency
  - example readiness
  - safety readiness
  - fake/live boundary
  - old name absence
  - privacy gate pass
  - release readiness
regression_gate_failures:
  - prior project name appears
  - secrets detected
  - demo missing
  - contracts drift
  - fake result marked observed
  - live tests required by default
safety:
  no_network: true
  no_release_publish: true
  no_real_experiment: true
  requires_human_review: true
required_tests:
  - tests/unit/test_quality_metrics.py
  - tests/unit/test_regression_gate.py
  - tests/unit/test_quality_report.py
  - tests/workflow/test_quality_gate_public_demo.py
