name: failure_taxonomy
version: 0.2.0-draft
status: capsule_contract
description: Capsule-local contract for Failure Taxonomy Engine.
mcp_server: turingresearch-plus
project: TuringResearch Plus
tool_contract_fields:
  - proposed_tool
  - input_model
  - output_model
  - network_behavior
  - implementation_status
implementation_status: implemented_minimal
public_api: false
proposed_tools:
  experiment.failure_analyze:
    proposed_tool: experiment.failure_analyze
    status: proposed_not_public_api
    input_model: FailureAnalysisInput
    output_model: FailureAttributionReport
    network_behavior: none
    implementation_status: implemented_minimal
categories:
  - FAST_RETURN
  - REPORT_ONLY
  - IDENTITY_COPY
  - FALLBACK_ONLY
  - REAL_BACKEND_UNAVAILABLE
  - MISSING_ASSETS
  - VISUAL_PROOF_INSUFFICIENT
  - FULL_BODY_REGRESSION
  - HAIRLINE_REGRESSION
  - HAND_OBJECT_CONFUSION
  - DEPTH_POINT_SCHEMA_MISMATCH
  - PACKAGE_INCOMPLETE
  - SPARSE_BACKEND_UNAVAILABLE
  - SMPLX_ALIGNMENT_WEAK
  - NOT_ENOUGH_EVIDENCE
  - PROMOTION_FORBIDDEN
  - STRICT_REGISTRY_FORBIDDEN
  - HUMAN_REVIEW_REQUIRED
rules:
  - Failure attribution requires evidence refs or requires-human-review.
  - Failure attribution must not fabricate experiment success.
  - Missing board proof maps to VISUAL_PROOF_INSUFFICIENT.
  - Missing adjacent predictions or semantic assets map to MISSING_ASSETS.
