name: turingresearch.live_adapters
version: 0.2.0-alpha
status: beta_contract_draft
description: Live adapter protocol contracts for TuringResearch Plus v0.2 beta.
mcp_server: turingresearch-plus
project: TuringResearch Plus
default_enabled: false
network_behavior: fake_mode_default
tool_contract_fields:
  - name
  - purpose
  - input_model
  - output_model
  - timeout_policy
  - retry_policy
  - rate_limit_policy
  - cache_behavior
  - error_model
  - fake_adapter_equivalent
  - live_test_marker
  - required_env_vars
  - default_enabled
adapters:
  SemanticScholarAdapter:
    name: SemanticScholarAdapter
    purpose: Optional live paper lookup and citation metadata retrieval.
    protocol: turing_research_plus.adapters.protocols.SemanticScholarAdapter
    input_model: SemanticScholarPaperLookup
    output_model: SemanticScholarPaperResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: semantic_scholar/paper_lookup with hashed cache keys
    error_model: AdapterError
    fake_adapter_equivalent: FakeSemanticScholarAdapter
    live_test_marker: live
    required_env_vars:
      - SEMANTIC_SCHOLAR_API_KEY
    default_enabled: false
    implementation_status: optional_live_adapter_minimal
    live_contract: contracts/semantic_scholar_live.yaml
  ArxivAdapter:
    name: ArxivAdapter
    purpose: Optional arXiv search and metadata retrieval.
    protocol: turing_research_plus.adapters.protocols.ArxivAdapter
    input_model: ArxivQuery
    output_model: ArxivSearchResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: arxiv/search with hashed cache keys
    error_model: AdapterError
    fake_adapter_equivalent: FakeArxivAdapter
    live_test_marker: live
    required_env_vars: []
    default_enabled: false
    implementation_status: fake_adapter_ready_live_not_implemented
  WebSearchAdapter:
    name: WebSearchAdapter
    purpose: Optional public web search for source discovery.
    protocol: turing_research_plus.adapters.protocols.WebSearchAdapter
    input_model: WebSearchRequest
    output_model: WebSearchResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: web/search with hashed cache keys
    error_model: AdapterError
    fake_adapter_equivalent: FakeWebSearchAdapter
    live_test_marker: live
    required_env_vars:
      - APIFY_TOKEN
    default_enabled: false
    implementation_status: fake_adapter_ready_live_not_implemented
  WebFetchAdapter:
    name: WebFetchAdapter
    purpose: Optional public web page fetch with source hygiene metadata.
    protocol: turing_research_plus.adapters.protocols.WebFetchAdapter
    input_model: WebFetchRequest
    output_model: WebFetchResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: web/fetch with hashed cache keys
    error_model: AdapterError
    fake_adapter_equivalent: FakeWebFetchAdapter
    live_test_marker: live
    required_env_vars:
      - APIFY_TOKEN
    default_enabled: false
    implementation_status: fake_adapter_ready_live_not_implemented
  OpenAICompatibleLLMAdapter:
    name: OpenAICompatibleLLMAdapter
    purpose: Optional OpenAI-compatible LLM completion adapter for future assisted workflows.
    protocol: turing_research_plus.adapters.protocols.OpenAICompatibleLLMAdapter
    input_model: LLMCompletionRequest
    output_model: LLMCompletionResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: openai_compatible/completion, write-through disabled by default
    error_model: AdapterError
    fake_adapter_equivalent: FakeOpenAICompatibleLLMAdapter
    live_test_marker: live
    required_env_vars:
      - OPENAI_API_KEY
    default_enabled: false
    implementation_status: fake_adapter_ready_live_not_implemented
  PDFConverterAdapter:
    name: PDFConverterAdapter
    purpose: Replaceable local PDF converter adapter for optional converter backends.
    protocol: turing_research_plus.adapters.protocols.PDFConverterAdapter
    input_model: PDFConversionRequest
    output_model: PDFConversionResult
    timeout_policy: AdapterTimeoutPolicy
    retry_policy: AdapterRetryPolicy
    rate_limit_policy: RateLimitPolicy
    cache_behavior: pdf/converter with hashed cache keys
    error_model: AdapterError
    fake_adapter_equivalent: FakePDFConverterAdapter
    live_test_marker: manual
    required_env_vars: []
    default_enabled: false
    implementation_status: fake_adapter_ready_live_not_implemented
types:
  SourceMetadata:
    required: [provider, retrieval_time, human_verified]
    fields:
      provider: string
      source_id: string?
      url: string?
      retrieval_time: datetime
      human_verified: false
      license: string?
  AdapterTimeoutPolicy:
    required: [connect_seconds, read_seconds, total_seconds]
    fields:
      connect_seconds: float
      read_seconds: float
      total_seconds: float
  AdapterRetryPolicy:
    required: [max_attempts, backoff_seconds, retry_on]
    fields:
      max_attempts: integer
      backoff_seconds: float
      retry_on: list[string]
  RateLimitPolicy:
    required: [on_limit]
    fields:
      requests_per_minute: integer?
      provider_quota_label: string?
      on_limit: string
  AdapterError:
    required: [code, message, retryable]
    fields:
      code: enum[missing_api_key,timeout,rate_limited,retry_exhausted,provider_error,invalid_response,unsupported,source_hygiene_blocked,live_disabled]
      message: string
      retryable: boolean
      provider: string?
      status_code: integer?
      details: object
  AdapterCachePolicy:
    required: [namespace, cache_key_fields, write_through]
    fields:
      namespace: string
      ttl_seconds: integer?
      cache_key_fields: list[string]
      write_through: boolean
rules:
  - Default enabled must be false for every live adapter.
  - Default tests must use fake adapters only.
  - Live tests must be marked live or manual and require explicit environment opt-in.
  - Missing API keys must return typed AdapterError data or skip live tests, not fail default tests.
  - Every live adapter must have a fake adapter equivalent.
  - Live results must not be automatically human-verified.
  - Live results must include source metadata and retrieval time.
  - Outputs feeding research conclusions must preserve EvidenceRef-compatible metadata.
  - Adapter cache implementations must hash cache keys and must not use raw URLs or prompts as filenames.
