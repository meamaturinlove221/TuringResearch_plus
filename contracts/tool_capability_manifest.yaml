name: tool_capability_manifest
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: tool_capability_manifest
status: implemented_minimal
release_target: v0.6 Sprint 2
api_status: local_python_helper_not_public_mcp
default_enabled: true
network_behavior: no_network
description: >-
  Provide a unified manifest for core tools, adapters, exporters, and workflows
  for docs, routing, MCP registry review, and public release notes.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

purpose: >-
  Keep capability exposure explicit without executing tools, starting MCP, or
  claiming live verification.
entry_required_fields:
  - capability_id
  - name
  - category
  - module
  - input_model
  - output_model
  - live_mode
  - fake_mode
  - required_env
  - safety_level
  - status
  - docs
  - tests
  - related_skills
covered_categories:
  - evidence
  - artifact
  - visual
  - advisor
  - pdf
  - paper
  - citation
  - collision
  - related work
  - route
  - failure
  - dashboard
  - remote artifact
  - handoff
  - plugin
  - workspace
safety:
  generated_from_static_catalog: true
  starts_mcp_server: false
  executes_tools: false
  live_mode_requires_env: true
  requires_human_review: true
  public_docs_do_not_verify_claims: true
non_goals:
  - no automatic tool execution
  - no live discovery
  - no marketplace publish
  - no public MCP tool registration
required_tests:
  - tests/unit/test_capability_models.py
  - tests/unit/test_capability_collector.py
  - tests/unit/test_capability_manifest.py
  - tests/unit/test_capability_markdown_export.py
  - tests/workflow/test_capability_manifest_fake.py
