name: mcp_plugin_registry
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: mcp_plugin_registry
status: implemented_minimal
release_target: v0.6 Sprint 2
api_status: local_python_helper_not_public_mcp
default_enabled: true
network_behavior: no_network
requires_human_review: true
description: >-
  Describe which manifest-only plugins may expose MCP tool declarations without
  starting the MCP server or dynamically loading third-party tools.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

purpose: >-
  Keep plugin-facing MCP tool exposure explicit, disabled by default for
  third-party plugins, and validation-only until manually reviewed.
entry_required_fields:
  - plugin_id
  - exposed_tool_name
  - namespace
  - input_schema
  - output_schema
  - permissions
  - safety_level
  - default_enabled
  - live_required
  - requires_api_key
  - fake_mode_supported
safety:
  requires_human_review: true
  starts_mcp_server: false
  loads_plugin_code: false
  dynamic_tool_loading: false
  third_party_default_enabled: false
  live_required_default_enabled: false
  requires_api_key_explicit: true
  core_tool_override_allowed: false
  namespace_required: true
non_goals:
  - no marketplace publishing
  - no automatic install
  - no live plugin execution
  - no public MCP tool registration
required_tests:
  - tests/unit/test_mcp_plugin_models.py
  - tests/unit/test_mcp_plugin_registry.py
  - tests/unit/test_mcp_tool_mapping.py
  - tests/unit/test_mcp_plugin_validator.py
  - tests/workflow/test_mcp_plugin_registry_fake.py
