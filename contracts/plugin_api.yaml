name: plugin_api
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: plugin_api
status: contract_draft
release_target: v0.8 planning
api_status: public_api_contract_draft
default_enabled: true
network_behavior: no_network
description: >-
  Draft public API contract for future plugin namespace boundaries. Plugin APIs
  are manifest-first and do not execute unknown code.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

module_name: turing_research_plugins
purpose: >-
  Provide plugin manifests, trusted local loading metadata, MCP plugin registry,
  skill market, capability manifest, sandbox policy, compatibility harness, and
  extension safety reports.
stability: experimental
current_compatibility_namespace: turing_research_plus
public_models:
  - PluginManifest
  - PluginRegistry
  - PluginLoadingReport
  - SandboxPolicy
  - PluginCompatibilityReport
  - MCPPluginRegistry
  - CapabilityManifest
  - ExtensionSafetyReport
public_functions_tools:
  - plugin_manifest_load
  - trusted_local_plugin_load
  - plugin_sandbox_evaluate
  - plugin_compatibility_check
  - mcp_plugin_registry_validate
  - capabilities_collect
  - skill_market_catalog_build
input_schema:
  plugin_manifest_path: local_path
  trusted_flag: explicit_boolean
  live_flag: explicit_boolean
  permissions: declared_list
output_schema:
  plugin_manifest: PluginManifest
  loading_report: PluginLoadingReport
  sandbox_report: model
  compatibility_report: PluginCompatibilityReport
internal_only_modules:
  - dynamic import internals
  - test fixture plugins
  - optional future sandbox probes
deprecated_aliases: []
tests:
  - tests/unit/test_plugin_manifest.py
  - tests/unit/test_plugin_loader.py
  - tests/unit/test_plugin_sandbox_policy.py
  - tests/unit/test_plugin_compatibility.py
  - tests/unit/test_mcp_plugin_registry.py
  - tests/contract/test_module_public_api_contracts.py
docs:
  - docs/module-public-api-contracts.md
  - docs/plugin-architecture.md
  - docs/trusted-local-plugin-loading.md
  - docs/plugin-sandbox-policy.md
safety:
  no_network_by_default: true
  no_unknown_code_execution: true
  third_party_disabled_by_default: true
  secrets_access_forbidden: true
non_goals:
  - no automatic plugin install
  - no unknown plugin execution
  - no marketplace publish
