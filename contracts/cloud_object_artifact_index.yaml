name: cloud_object_artifact_index
version: 0.1.0
project: TuringResearch Plus
mcp_server: turingresearch-plus
contract: cloud_object_artifact_index
status: implemented_minimal
release_target: v0.4.0
api_status: local_python_helper_not_public_mcp
default_enabled: false
network_behavior: fake_mode_default
description: >
  Describe research artifacts in S3/R2/OSS/GCS-style object stores through a
  provider-neutral index without real cloud SDK calls, credential storage, or
  object payload downloads.
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status

purpose: >
  Provide a cloud-object-shaped artifact manifest for remote artifact review
  workflows while keeping object data metadata-only by default.

models:
  input: ObjectArtifactIndexRequest
  output: ObjectArtifactIndex
  object: ObjectArtifactRef

proposed_tools:
  - name: artifact.cloud_index_optional
    command: turing artifact cloud-index
    status: local_helper_not_public_mcp
    default_enabled: false

supported_providers:
  - s3
  - r2
  - oss
  - gcs
  - generic

object_artifact_index_fields:
  - provider
  - bucket_or_container
  - prefix
  - objects
  - size
  - hash
  - content_type
  - status
  - omitted_reason
  - evidence_tags
  - requires_human_review

safety_policy:
  no_real_cloud_sdk: true
  no_credentials_saved: true
  no_large_file_download: true
  no_raw_data_download: true
  index_and_proposed_imports_only: true
  provider_neutral: true
  future_provider_extension_allowed:
    - s3
    - r2
    - oss
    - gcs
  human_review_required: true
  live_result_not_verified: true

integration:
  can_feed:
    - artifact_audit
    - run_ingest
    - handoff_bundle
    - remote_artifact_integration
    - evidence_proposed_updates
    - advisor_pack_inputs
  must_not_feed_as:
    - observed_without_review
    - verified_evidence
