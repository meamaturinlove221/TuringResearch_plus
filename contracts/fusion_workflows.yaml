  WorkflowRunRequest:
    required: [workflow_id, dry_run, budget_gate, state_ledger]
    fields:
      workflow_id: string
      dry_run: boolean
      fake_service: boolean
      budget_gate: BudgetGate
      state_ledger: StateLedger
      inputs: object
  WorkflowRunResult:
    required: [workflow_id, status, artifacts, ledger_updates]
    fields:
      workflow_id: string
      status: enum[planned,running,blocked,completed,failed]
      artifacts: list[ResearchArtifact]
      ledger_updates: list[LedgerEvent]
      blocked_reason: string?
  GraphToolInput:
    required: [query]
    fields:
      query: object
      dry_run: boolean
      fake_service: boolean
  GraphToolOutput:
    required: [status, artifacts, evidence]
    fields:
      status: enum[ok,blocked,error]
      artifacts: list[ResearchArtifact]
      evidence: list[EvidenceRef]
  ResearchWorkflowInput:
    required: [campaign_id, budget_gate, state_ledger]
    fields:
      campaign_id: string
      budget_gate: BudgetGate
      state_ledger: StateLedger
      dry_run: boolean
      fake_service: boolean
      inputs: object
  ResearchWorkflowOutput:
    required: [status, artifacts, ledger_updates]
    fields:
      status: enum[ok,blocked,error]
      artifacts: list[ResearchArtifact]
      ledger_updates: list[LedgerEvent]
      errors: list[TuringResearchError]
rules:
  - Fusion cannot depend on Core internals.
  - Workflows must support dry-run and fake-service mode.
  - All conclusions require EvidenceRef.
  - Graph tools are implemented through fake-adapter minimal services in v0.1.0.
  - Research tools listed here are dry-run/fake-service workflows in v0.1.0.

  CitationGraphExpandInput:
    required: [seed_paper_ids]
    fields:
      seed_paper_ids: list[string]
      direction: enum[backward,forward,both]
      depth_limit: integer
      max_nodes: integer
      min_year: integer?
      max_year: integer?
      min_citation_count: integer?
      open_access_only: boolean
      recommendation_limit: integer
  CitationGraphOutput:
    required: [status, nodes, edges, frontier_nodes, recommended_next_reads]
    fields:
      status: enum[ok,error]
      nodes: list[PaperNode]
      edges: list[CitationEdge]
      frontier_nodes: list[PaperNode]
      recommended_next_reads: list[PaperNode]
  AuthorNetworkInput:
    required: [seed_author_ids]
    fields:
      seed_author_ids: list[string]
      max_depth: integer
      max_authors: integer
  AuthorNetworkOutput:
    required: [status, authors, edges, frontier_authors]
    fields:
      status: enum[ok,error]
      authors: list[AuthorNode]
      edges: list[AuthorEdge]
      frontier_authors: list[AuthorNode]
