name: turingresearch.fusion_workflows
version: 0.2.0
status: draft
description: Fusion, graph, research, and context MCP namespace contracts for TuringResearch Plus.
mcp_server: turingresearch-plus
project: TuringResearch Plus
tool_contract_fields:
  - tool_name
  - namespace
  - input_model
  - output_model
  - cache_behavior
  - network_behavior
  - error_behavior
  - evidence_requirement
  - required_tests
  - implementation_status
services:
  FusionWorkflow:
    boundary: workflow_protocol
    methods:
      run:
        input: WorkflowRunRequest
        output: WorkflowRunResult

  SemanticGraphAdapter:
    boundary: adapter_protocol
    methods:
      paper_lookup:
        input: PaperLookupInput
        output: PaperLookupOutput
      paper_batch:
        input: PaperBatchInput
        output: PaperBatchOutput
      references:
        input: PaperListInput
        output: PaperListOutput
      citations:
        input: PaperListInput
        output: PaperListOutput
      recommendations:
        input: RecommendationInput
        output: RecommendationOutput
      author:
        input: AuthorInput
        output: AuthorOutput
      author_papers:
        input: AuthorInput
        output: AuthorPapersOutput
tools:
  graph.paper_lookup:
    tool_name: graph.paper_lookup
    namespace: graph
    input_model: GraphPaperLookupInput
    output_model: GraphPaperLookupOutput
    cache_behavior: adapter-level cache; service accepts fake adapter in tests
    network_behavior: adapterized; tests mocked; no real network in unit tests
    error_behavior: typed graph adapter or unavailable error
    evidence_requirement: EvidenceRef required when graph outputs become ResearchArtifact
    required_tests:
      - contract
      - mocked adapter test
      - fake-service test
    implementation_status: implemented_minimal
