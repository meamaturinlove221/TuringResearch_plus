schema_version: 0.1.0

status: draft

feature: benchmark_replay_suite

release_target: v0.6 Sprint 3

purpose: >-

  Public users need repeatable fake/default examples that exercise workflows without private data or real experiment claims.

models:

  primary: BenchmarkReplayReport, BenchmarkScenario, ReplayReadinessReport

commands:

  - command: turing demo replay

    tool: demo.replay

    output: BenchmarkReplayReport

safety:

  default_network: false

  requires_human_review: true

  no_secrets: true

  no_raw_data: true

  no_private_model_files: true

  no_planned_as_observed: true

non_goals:

  - no real benchmark claims

  - no private data

  - no live network dependency
