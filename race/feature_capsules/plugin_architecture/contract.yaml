schema_version: 0.1.0

status: draft

feature: plugin_architecture

release_target: v0.6 Sprint 2

purpose: >-

  TuringResearch needs a public extension boundary without allowing unreviewed code or unsafe live access.

models:

  primary: PluginManifest, PluginCapability, PluginSafetyProfile

commands:

  - command: turing plugin validate

    tool: plugin.validate

    output: PluginValidationReport

safety:

  default_network: false

  requires_human_review: true

  no_secrets: true

  no_raw_data: true

  no_private_model_files: true

  no_planned_as_observed: true

non_goals:

  - no plugin marketplace publishing

  - no automatic install

  - no untrusted code execution
