schema_version: 0.1.0
status: draft
feature: plugin_sandbox_policy
release_target: v0.7
purpose: >-
  Define explicit sandbox permission decisions before runtime plugin loading expands.
models:
  primary: PluginSandboxPolicy, SandboxPermissionDecision, SandboxPolicyReport
commands:
  - command: turing plugin sandbox-check
    tool: plugin.sandbox_check
    output: SandboxPolicyReport
safety:
  default_network: false
  requires_human_review: true
  execute_code_default: forbidden
  remote_write_default: forbidden
  secrets_access: forbidden
  raw_data_access: restricted
  no_private_model_files: true
non_goals:
  - no OS-level sandbox implementation
  - no secrets access
  - no remote write permission by default
