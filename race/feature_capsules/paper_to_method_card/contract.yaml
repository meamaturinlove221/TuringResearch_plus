  input_model: PaperMethodCardInput
  output_model: PaperMethodCard
data_models:
  - PaperMethodCard
  - MethodComponent
  - MethodEvidenceRef
  - MethodLimitation
  - MethodArchitectureCue
related_contracts:
  - contracts/method_cards.yaml
  - contracts/pdf_markdown.yaml
  - contracts/paper_pipeline.yaml
required_tests:
  - tests/unit/test_method_card_models.py
  - tests/unit/test_paper_to_method_card.py
  - tests/workflow/test_paper_to_method_card_dry_run.py
network_behavior: none
local_path_behavior: fixture-only by default
copyright_behavior: no copyrighted paper text copied into repo
notes:
  - Missing real paper input returns requires-real-paper.
  - Do not fabricate method components.
