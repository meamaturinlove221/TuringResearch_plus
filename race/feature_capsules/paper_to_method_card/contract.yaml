feature_name: paper_to_method_card
project: TuringResearch Plus
status: capsule_draft
release_target: v0.2.0_sprint_2
implementation_status: skeleton_only
source_inputs:
  - docs/v0.2.0-sprint-2-final-scope.md
  - docs/v0.2.0-sprint-2-test-plan.md
  - docs/pdf_phase_b_figure_table_extraction.md
proposed_command: turing paper method-card
proposed_tool:
