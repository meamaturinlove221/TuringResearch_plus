schema_version: 0.1.0
status: draft
feature: public_release_candidate_gate
release_target: v0.7
purpose: >-
  Gate public release candidates with tests, docs, privacy, plugin safety, licensing, and roadmap honesty checks.
models:
  primary: PublicReleaseRCReport, PublicReleaseGoNoGo, PublicReleaseBlockerList
commands:
  - command: turing release rc-gate
    tool: release.public_rc_gate
    output: PublicReleaseRCReport
safety:
  default_network: false
  requires_human_review: true
  no_auto_release: true
  no_tag_creation: true
  no_secrets: true
  no_raw_data: true
  no_private_model_files: true
  no_fake_result_observed: true
non_goals:
  - no automatic release
  - no tag creation
  - no GitHub release publication
