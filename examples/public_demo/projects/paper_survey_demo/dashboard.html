<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper Survey Demo Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #20242a; background: #f7f8fa; }
    .badge, .card { border: 1px solid #ccd3dd; border-radius: 6px; background: #fff; }
    .badge { display: inline-block; padding: 4px 8px; margin-right: 6px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
    .card { padding: 14px; }
  </style>
</head>
<body>
  <h1>Paper Survey Demo Dashboard</h1>
  <span class="badge">demo only</span>
  <span class="badge">safe demo mode</span>
  <span class="badge">requires human review</span>
  <div class="grid">
    <section class="card"><h2>Reading Status</h2><p>Placeholder notes require source review.</p></section>
    <section class="card"><h2>Related Work</h2><p>Buckets are scaffold-only.</p></section>
    <section class="card"><h2>Claims</h2><p>Final survey claims are blocked.</p></section>
    <section class="card"><h2>Advisor Action</h2><p>Select papers for deep review.</p></section>
  </div>
  <footer><p>Not final paper text.</p></footer>
</body>
</html>
